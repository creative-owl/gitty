name: Bug report
description: Report something broken in Gitty.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Before submitting, search existing issues and remove secrets, private repository names, access tokens, and confidential patch contents. Report security vulnerabilities privately through the security advisory link in the issue chooser.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What broke, and what were you trying to do?
      placeholder: Gitty fails to render a PR diff when...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the smallest set of steps, commands, patch input, or repository state that reproduces the issue.
      placeholder: |
        bun run start
        gitty --staged
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include error messages, screenshots, or terminal recordings when useful.
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Affected area
      description: Check every area that applies.
      options:
        - label: Working changes
        - label: Staged changes
        - label: Patch file input
        - label: Stdin input
        - label: Multiple repositories
        - label: GitHub PR list
        - label: GitHub PR discussion view
        - label: GitHub PR diff view
        - label: Markdown or Mermaid rendering
        - label: Theme or terminal rendering
        - label: CLI flags or help output
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include versions and terminal details relevant to the bug.
      value: |
        - Gitty version or commit SHA:
        - Install method:
        - Bun version:
        - Git version:
        - GitHub CLI version:
        - OS:
        - Terminal emulator:
        - Terminal size:
        - Shell:
        - Additional context:
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed secrets, private repository names, access tokens, and confidential patch contents.
          required: true
