name: Feature request
description: Suggest an improvement or new workflow for Gitty.
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the workflow and why it belongs in Gitty.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to accomplish, and what is hard about it today?
      placeholder: When reviewing PRs in the terminal, I need to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Gitty do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or other designs you considered.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Related area
      description: Check every area that applies.
      options:
        - label: Local git changes
        - label: Patch or stdin input
        - label: Multiple repositories
        - label: GitHub pull requests
        - label: Markdown or Mermaid rendering
        - label: Terminal UI
        - label: CLI flags
        - label: Documentation
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, terminal recordings, or related tools when useful.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for similar requests.
          required: true
        - label: I removed secrets, private repository names, access tokens, and confidential patch contents.
          required: true
